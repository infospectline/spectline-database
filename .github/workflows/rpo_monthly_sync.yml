name: Slovakia companies A/B weekly sync

"on":
  schedule:
    - cron: "0 2 * * 0" # Sunday 02:00 UTC (03:00 CET in winter)
  workflow_dispatch: {}

concurrency:
  group: slovakia-companies-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RPO_DUMP_URL: "https://s3.eu-central-1.amazonaws.com/ekosystem-slovensko-digital-dumps/rpo.sql.gz"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client curl gzip python3-pip

      - name: Install python deps
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install psycopg2-binary

      - name: Start local Postgres (temporary)
        run: |
          set -euo pipefail
          docker run -d --name rpo-pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:16
          for i in {1..60}; do
            PGPASSWORD=postgres pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 2
          done
          echo "Postgres not ready" >&2
          exit 1

      - name: Download RPO dump
        run: |
          set -euo pipefail
          curl -L "$RPO_DUMP_URL" -o rpo.sql.gz
          ls -lh rpo.sql.gz

      - name: Import RPO into local Postgres
        run: |
          set -euo pipefail
          gunzip -c rpo.sql.gz | PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1

      - name: Sync Slovakia companies (A/B swap)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BATCH_SIZE: "1000"
          PRINT_EVERY: "10000"
        run: |
          set -euo pipefail
          python3 scripts/sync_slovakia_ab.py

      - name: Cleanup
        if: always()
        run: |
          docker rm -f rpo-pg || true
